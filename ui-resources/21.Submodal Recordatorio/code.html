<script>
        // Simple Interaction logic for sub-steps
        const subStepInput = document.querySelector('#sub-steps-container input');
        const subStepContainer = document.getElementById('sub-steps-container');

        subStepInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                const newValue = this.value;
                const newStep = document.createElement('div');
                newStep.className = 'flex items-center gap-3 p-3 bg-surface-container-low rounded-lg group transition-all hover:bg-surface-container animate-in slide-in-from-top-2 duration-200';
                newStep.innerHTML = `
                    <span class="material-symbols-outlined text-outline-variant" data-icon="radio_button_unchecked">radio_button_unchecked</span>
                    <span class="flex-grow text-task-item text-on-surface">${newValue}</span>
                    <button class="opacity-0 group-hover:opacity-100 transition-opacity text-outline hover:text-error remove-step">
                        <span class="material-symbols-outlined" data-icon="close">close</span>
                    </button>
                `;
                subStepContainer.prepend(newStep);
                this.value = '';

                // Add remove functionality
                newStep.querySelector('.remove-step').addEventListener('click', () => {
                    newStep.classList.add('animate-out', 'fade-out', 'slide-out-to-right-4');
                    setTimeout(() => newStep.remove(), 200);
                });
            }
        });

        // Toggle category selection
        const categories = document.querySelectorAll('section:nth-of-type(3) button:not(:last-child)');
        categories.forEach(btn => {
            btn.addEventListener('click', () => {
                categories.forEach(b => {
                    b.classList.remove('bg-primary/10', 'border-primary', 'border-2');
                    b.classList.add('border', 'border-outline-variant');
                });
                btn.classList.add('bg-primary/10', 'border-primary', 'border-2');
                btn.classList.remove('border', 'border-outline-variant');
            });
        });

        // Close modal on escape (simulated)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                console.log('Modal would close here');
            }
        });
    </script>
