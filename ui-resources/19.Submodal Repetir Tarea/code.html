<body class="bg-background text-on-surface font-body-md overflow-hidden">
<!-- Blurred Background: Detailed Create Task Modal (Mockup of SCREEN_17) -->

<div class="w-full max-w-2xl bg-white rounded-xl shadow-2xl overflow-hidden border border-border-subtle-light h-[819px] flex flex-col">
<div class="p-8 border-b border-border-subtle-light flex justify-between items-center">
<div class="h-8 w-48 bg-surface-variant rounded-full animate-pulse"></div>
<div class="h-6 w-6 bg-surface-variant rounded-full animate-pulse"></div>

</div>
</div>

<!-- Overlay Dimmer -->

<!-- Repeat Sub-Modal (The Main Task) -->
<div class="fixed inset-0 flex items-center justify-center z-50 p-4">
<div class="glass-panel w-full max-w-[320px] rounded-xl shadow-2xl border border-white/50 overflow-hidden transform scale-100 transition-all duration-300">
<!-- Modal Header -->
<div class="flex items-center justify-between px-5 py-4 border-b border-on-surface-variant/10">
<h2 class="font-headline-md text-headline-md text-on-surface">Repeat</h2>
<button class="p-1.5 rounded-full hover:bg-on-surface-variant/10 transition-colors text-on-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Options List -->
<div class="py-2 px-1">
<button class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-primary-container/5 hover:text-primary transition-all duration-200 group">
<div class="w-8 h-8 rounded-full bg-surface-variant/50 flex items-center justify-center group-hover:bg-primary/10">
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
</div>
<span class="font-medium">Daily</span>
</button>
<button class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-primary-container/5 hover:text-primary transition-all duration-200 group">
<div class="w-8 h-8 rounded-full bg-surface-variant/50 flex items-center justify-center group-hover:bg-primary/10">
<span class="material-symbols-outlined text-[18px]">work</span>
</div>

</button>
<button class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-primary-container/5 hover:text-primary transition-all duration-200 group">
<div class="w-8 h-8 rounded-full bg-surface-variant/50 flex items-center justify-center group-hover:bg-primary/10">
<span class="material-symbols-outlined text-[18px]">event_repeat</span>
</div>
<span class="font-medium">Weekly</span>
</button>
<button class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-primary-container/5 hover:text-primary transition-all duration-200 group">

<span class="material-symbols-outlined text-[18px]">calendar_month</span>
</div>

</button>
<button class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-primary-container/5 hover:text-primary transition-all duration-200 group">
<div class="w-8 h-8 rounded-full bg-surface-variant/50 flex items-center justify-center group-hover:bg-primary/10">

</div>

</button>

<!-- Atmospheric Micro-interaction Script -->
<script>
        // Simple click effect for list items
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.style.transform = 'scale(0.98)';
            });
            button.addEventListener('mouseup', () => {
                button.style.transform = 'scale(1)';
            });
            button.addEventListener('mouseleave', () => {
                button.style.transform = 'scale(1)';
            });
        });

        // Close modal logic (visual only for this prototype)
        document.querySelector('button .material-symbols-outlined:contains("close")')?.parentElement.addEventListener('click', () => {
            const modal = document.querySelector('.glass-panel');
            modal.style.opacity = '0';
            modal.style.transform = 'scale(0.95)';
            setTimeout(() => {
                window.location.reload(); // Reset state
            }, 300);
        });
    </script>
